<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d9466">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>더홈점검 · 점검 v2</title>
<style>
/* ============================================================
   더홈점검 v2 — "Field Instrument" Design System
   단일 파일 · 바닐라 · IndexedDB · 오프라인 우선
   ============================================================ */
:root{
  /* signature */
  --brand:#0d9466;        /* 더홈 그린 (살짝 깊게) */
  --brand-bright:#1ec88f; /* 활성 강조 */
  --brand-ink:#062b20;
  --warn:#f59e0b;
  --bad:#f43f5e;
  --good:#22c55e;
  /* dark (default) — 현장 야간/실내 */
  --bg:#0b1118;
  --bg-2:#0f1722;
  --surface:#141d2a;
  --surface-2:#1a2433;
  --line:rgba(255,255,255,.09);
  --line-strong:rgba(255,255,255,.16);
  --ink:#eef3f8;          /* 본문 (순백 글레어 완화) */
  --ink-2:#aebccb;        /* 보조 (대비 강화) */
  --ink-3:#7c8aa0;
  --shadow:0 8px 24px rgba(0,0,0,.45);
  --radius:16px;
  --tap:52px;             /* 장갑 친화 탭 타겟 */
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;
}
body.light{
  --bg:#eef1f5;
  --bg-2:#e6eaf0;
  --surface:#ffffff;
  --surface-2:#f4f6f9;
  --line:rgba(15,30,50,.10);
  --line-strong:rgba(15,30,50,.20);
  --ink:#0e1825;
  --ink-2:#46566a;
  --ink-3:#74839a;
  --shadow:0 6px 20px rgba(20,40,70,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:
    radial-gradient(1200px 600px at 80% -10%,rgba(30,200,143,.10),transparent 60%),
    linear-gradient(180deg,var(--bg) 0%,var(--bg-2) 100%);
  background-attachment:fixed;
  color:var(--ink);
  min-height:100vh;
  -webkit-text-size-adjust:100%;
  overflow-x:hidden;
  transition:background .3s,color .3s;
}
.app{max-width:680px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* ---------- header ---------- */
.top{
  position:sticky;top:0;z-index:50;
  padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 14px;
  background:linear-gradient(180deg,rgba(13,148,102,.16),transparent),var(--bg);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px);
}
.top-row{display:flex;align-items:center;gap:12px}
.logo{
  width:40px;height:40px;border-radius:12px;flex:none;
  background:linear-gradient(135deg,var(--brand-bright),var(--brand));
  display:grid;place-items:center;font-size:22px;
  box-shadow:0 4px 14px rgba(13,148,102,.5);
}
.brand{flex:1;min-width:0}
.brand h1{font-size:17px;font-weight:800;letter-spacing:-.2px}
.brand .sub{font-size:11px;color:var(--ink-2);font-family:var(--mono);letter-spacing:.5px;margin-top:1px}
.icon-btn{
  width:42px;height:42px;border-radius:12px;border:1px solid var(--line-strong);
  background:var(--surface);color:var(--ink);font-size:19px;cursor:pointer;
  display:grid;place-items:center;flex:none;transition:transform .12s,background .2s;
}
.icon-btn:active{transform:scale(.92)}

/* current project chip */
.ctx{
  margin-top:12px;display:flex;align-items:center;gap:10px;
  padding:10px 12px;border:1px solid var(--line);border-radius:12px;
  background:var(--surface);
}
.ctx .name{font-weight:700;font-size:14px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctx .unit{font-family:var(--mono);font-size:13px;color:var(--brand-bright);font-weight:700}
.ctx.empty{color:var(--ink-2);font-size:13px;justify-content:center}

/* progress */
.prog{height:5px;background:var(--surface-2);border-radius:99px;overflow:hidden;margin-top:12px}
.prog > i{display:block;height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,var(--brand),var(--brand-bright));transition:width .4s}

/* ---------- tabs ---------- */
.tabs{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;position:sticky;
  top:calc(env(safe-area-inset-top,0px) + 0px);z-index:40}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:none;display:flex;align-items:center;gap:7px;
  padding:11px 16px;border-radius:12px;border:1px solid var(--line);
  background:var(--surface);color:var(--ink-2);font-weight:700;font-size:13px;cursor:pointer;
  transition:all .18s;white-space:nowrap;
}
.tab .e{font-size:15px}
.tab.on{background:var(--brand);color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(13,148,102,.4)}

/* ---------- content ---------- */
main{flex:1;padding:6px 16px 120px}
section{display:none;animation:rise .28s ease}
section.on{display:block}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.card.tight{padding:14px}
.h{font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--brand-bright);
  font-family:var(--mono);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.h .e{font-size:15px}

label.f{display:block;font-size:12px;font-weight:700;color:var(--ink-2);margin:0 0 7px;letter-spacing:.2px}
.in{width:100%;padding:14px;background:var(--bg-2);border:1px solid var(--line-strong);border-radius:12px;
  color:var(--ink);font-size:16px;font-family:var(--sans);transition:border .2s,box-shadow .2s}
body.light .in{background:var(--surface-2)}
.in:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(13,148,102,.18)}
.in::placeholder{color:var(--ink-3)}
textarea.in{resize:vertical;min-height:60px;line-height:1.5}
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* buttons */
.btn{width:100%;min-height:var(--tap);padding:0 18px;border:none;border-radius:13px;font-weight:800;font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans);
  transition:transform .12s,opacity .2s,box-shadow .2s}
.btn:active{transform:scale(.97)}
.btn.p{background:linear-gradient(135deg,var(--brand-bright),var(--brand));color:#fff;
  box-shadow:0 6px 18px rgba(13,148,102,.45)}
.btn.g{background:var(--surface-2);color:var(--ink);border:1px solid var(--line-strong)}
.btn.warn{background:rgba(245,158,11,.12);color:var(--warn);border:1px solid var(--warn)}
.btn.bad{background:rgba(244,63,94,.12);color:var(--bad);border:1px solid var(--bad)}
.btn.sm{min-height:42px;font-size:13px;border-radius:11px}

/* chips / touch select */
.count{font-family:var(--mono);font-size:11px;color:var(--ink-2);margin:-2px 0 8px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  padding:11px 14px;border-radius:11px;border:1.5px solid var(--line-strong);
  background:var(--bg-2);color:var(--ink-2);font-weight:700;font-size:14px;cursor:pointer;
  transition:all .14s;min-height:44px;display:inline-flex;align-items:center;
}
body.light .chip{background:var(--surface-2)}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 4px 12px rgba(13,148,102,.35)}
.chip:active{transform:scale(.94)}
.chip[disabled]{opacity:.35;pointer-events:none}
.sub-h{font-size:11px;font-family:var(--mono);color:var(--ink-3);letter-spacing:.6px;margin:14px 0 8px;text-transform:uppercase}

/* defect card */
.dcard{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--brand);
  border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.dhead{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.dno{font-family:var(--mono);font-weight:800;font-size:13px;background:var(--brand);color:#fff;padding:6px 12px;border-radius:9px}
.tagchip{font-size:11px;font-weight:800;color:#fff;padding:5px 10px;border-radius:99px;letter-spacing:.3px}
.dsummary{flex:1;font-size:13px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* photo slots */
.shots{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.slot{border:2px dashed var(--line-strong);border-radius:13px;overflow:hidden;background:var(--bg-2);position:relative}
.slot.filled{border-style:solid}
.slot .ph{aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer}
.slot .ph .ic{font-size:30px;opacity:.5}
.slot .ph .lb{font-size:12px;font-weight:800;color:var(--ink-2)}
.slot .ph .tag{font-family:var(--mono);font-size:10px;color:var(--brand-bright);letter-spacing:.5px}
.slot img{display:block;width:100%;aspect-ratio:4/3;object-fit:cover}
.slot .badge{position:absolute;top:7px;left:7px;font-family:var(--mono);font-size:10px;font-weight:800;
  background:rgba(13,148,102,.92);color:#fff;padding:3px 8px;border-radius:7px;letter-spacing:.5px}
.slot .acts{display:flex;border-top:1px solid var(--line)}
.slot .acts button{flex:1;border:none;background:var(--surface-2);color:var(--ink-2);padding:9px 4px;
  font-size:11px;font-weight:700;cursor:pointer;border-left:1px solid var(--line)}
.slot .acts button:first-child{border-left:none}
.slot .acts button.del{color:var(--bad)}

/* equipment & air */
.eqgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.eqslot{border:2px dashed var(--line-strong);border-radius:11px;aspect-ratio:1;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;background:var(--bg-2);position:relative}
.eqslot.filled{border-style:solid}
.eqslot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.eqslot .zl{font-size:11px;font-weight:800;color:var(--ink-2);z-index:1}
.eqslot .ic{font-size:22px;opacity:.45;z-index:1}
.aq{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.aq:last-child{border-bottom:none}
.aq .nm{font-weight:700;font-size:14px}
.aq .nm small{display:block;color:var(--ink-3);font-size:11px;font-family:var(--mono);font-weight:600}
.aq input{width:120px;text-align:right;font-family:var(--mono)}

/* project list */
.plist{display:flex;flex-direction:column;gap:8px}
.pitem{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:13px;
  background:var(--bg-2);cursor:pointer;transition:border .2s,transform .12s}
.pitem:active{transform:scale(.99)}
.pitem.on{border-color:var(--brand);background:rgba(13,148,102,.1)}
.pitem .pi-main{flex:1;min-width:0}
.pitem .pi-main b{font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pitem .pi-main span{font-size:12px;color:var(--ink-2);font-family:var(--mono)}
.pitem .pi-cnt{font-family:var(--mono);font-size:11px;color:var(--ink-2);text-align:right;flex:none}
.pitem .pi-cnt b{color:var(--brand-bright);font-size:15px;display:block}

.empty{text-align:center;color:var(--ink-2);padding:40px 16px;font-size:14px}
.empty .e{font-size:40px;display:block;margin-bottom:10px;opacity:.6}

/* fab */
.fab{position:fixed;right:max(18px,env(safe-area-inset-right));bottom:max(22px,calc(env(safe-area-inset-bottom,0px) + 22px));
  width:62px;height:62px;border-radius:20px;border:none;cursor:pointer;z-index:60;
  background:linear-gradient(135deg,var(--brand-bright),var(--brand));color:#fff;font-size:30px;
  box-shadow:0 10px 26px rgba(13,148,102,.55);display:grid;place-items:center;transition:transform .15s}
.fab:active{transform:scale(.9)}

/* camera modal */
.cam{position:fixed;inset:0;z-index:200;background:#000;display:none;flex-direction:column}
.cam.on{display:flex}
.cam .stage{flex:1;position:relative;overflow:hidden;display:grid;place-items:center}
.cam video{width:100%;height:100%;object-fit:cover}
.cam canvas{position:absolute;inset:0;width:100%;height:100%}
.cam .hint{position:absolute;top:calc(env(safe-area-inset-top,0px) + 14px);left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:700;padding:7px 14px;border-radius:99px;z-index:5}
.cam .tag{position:absolute;top:calc(env(safe-area-inset-top,0px) + 14px);left:14px;font-family:var(--mono);
  background:var(--brand);color:#fff;font-size:11px;font-weight:800;padding:5px 11px;border-radius:8px;z-index:5}
.cam .bar{display:flex;align-items:center;justify-content:space-between;
  padding:18px 26px calc(env(safe-area-inset-bottom,0px) + 22px);gap:18px;background:#000}
.cam .shutter{width:74px;height:74px;border-radius:50%;border:5px solid rgba(255,255,255,.35);background:#fff;cursor:pointer;flex:none;transition:transform .1s}
.cam .shutter:active{transform:scale(.9)}
.cam .cbtn{color:#fff;background:rgba(255,255,255,.14);border:none;width:54px;height:54px;border-radius:50%;
  font-size:20px;cursor:pointer;display:grid;place-items:center}
.cam .cbtn.txt{font-size:13px;font-weight:800;width:auto;padding:0 16px;border-radius:99px;height:46px}

/* toast / loading */
.toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 100px);transform:translate(-50%,20px);
  background:var(--ink);color:var(--bg);font-weight:700;font-size:14px;padding:12px 20px;border-radius:99px;
  z-index:300;opacity:0;pointer-events:none;transition:all .3s;box-shadow:var(--shadow);max-width:90%}
.toast.on{opacity:1;transform:translate(-50%,0)}
.load{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.6);display:none;place-items:center}
.load.on{display:grid}
.spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--brand-bright);
  border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* modal sheet */
.sheet{position:fixed;inset:0;z-index:180;background:rgba(0,0,0,.55);display:none;align-items:flex-end}
.sheet.on{display:flex}
.sheet .panel{width:100%;max-width:680px;margin:0 auto;background:var(--surface);border-radius:22px 22px 0 0;
  padding:22px 18px calc(env(safe-area-inset-bottom,0px) + 22px);max-height:86vh;overflow:auto;animation:up .3s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet h3{font-size:17px;font-weight:800;margin-bottom:16px}

/* report (print) */
#reportDoc{display:none}
@media print{
  body *{visibility:hidden}
  #reportDoc,#reportDoc *{visibility:visible}
  #reportDoc{display:block;position:absolute;inset:0;background:#fff;color:#000;padding:0}
  .app,.fab,.toast{display:none!important}
}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <header class="top">
    <div class="top-row">
      <div class="logo">🏠</div>
      <div class="brand">
        <h1>더홈점검</h1>
        <div class="sub">INSPECTION OS · v2</div>
      </div>
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="테마">🌙</button>
    </div>
    <div class="ctx empty" id="ctx" onclick="go('projects')">프로젝트를 선택하세요</div>
    <div class="prog"><i id="prog"></i></div>
  </header>

  <!-- TABS -->
  <nav class="tabs" id="tabs">
    <button class="tab on" data-t="projects" onclick="go('projects',this)"><span class="e">📁</span>프로젝트</button>
    <button class="tab" data-t="defects" onclick="go('defects',this)"><span class="e">🔍</span>하자점검</button>
    <button class="tab" data-t="equip" onclick="go('equip',this)"><span class="e">📸</span>장비점검</button>
    <button class="tab" data-t="air" onclick="go('air',this)"><span class="e">🌬️</span>공기질</button>
    <button class="tab" data-t="report" onclick="go('report',this)"><span class="e">📄</span>보고서</button>
  </nav>

  <main>
    <!-- PROJECTS -->
    <section id="projects" class="on">
      <div class="card">
        <div class="h"><span class="e">📁</span>프로젝트 목록</div>
        <div class="plist" id="plist"></div>
        <button class="btn p" style="margin-top:14px" onclick="newProject()">＋ 새 프로젝트</button>
      </div>
      <div class="card" id="pinfoCard" style="display:none">
        <div class="h"><span class="e">📝</span>프로젝트 정보</div>
        <div class="field"><label class="f">아파트 단지</label>
          <input class="in" id="f_apt" placeholder="예: 래미안 원베일리" oninput="upd('apt',this.value)"></div>
        <div class="row2">
          <div class="field"><label class="f">동</label><input class="in" id="f_dong" inputmode="numeric" placeholder="101" oninput="upd('dong',this.value)"></div>
          <div class="field"><label class="f">호수</label><input class="in" id="f_ho" inputmode="numeric" placeholder="1502" oninput="upd('ho',this.value)"></div>
        </div>
        <div class="row2">
          <div class="field"><label class="f">점검일</label><input class="in" id="f_date" type="date" oninput="upd('date',this.value)"></div>
          <div class="field"><label class="f">점검자</label><input class="in" id="f_author" placeholder="작성자" oninput="upd('author',this.value)"></div>
        </div>
        <div class="row2">
          <div class="field"><label class="f">고객명</label><input class="in" id="f_cust" placeholder="고객 이름" oninput="upd('cust',this.value)"></div>
          <div class="field"><label class="f">연락처</label><input class="in" id="f_phone" type="tel" inputmode="numeric" placeholder="010-0000-0000" oninput="upd('phone',this.value)"></div>
        </div>
        <button class="btn bad sm" style="margin-top:6px" onclick="delProject()">🗑 이 프로젝트 삭제</button>
      </div>
    </section>

    <!-- DEFECTS -->
    <section id="defects">
      <div id="defectWrap"></div>
    </section>

    <!-- EQUIPMENT -->
    <section id="equip">
      <div class="card tight"><div class="h"><span class="e">📸</span>장비점검 · 구역별 촬영</div>
        <p style="color:var(--ink-2);font-size:13px;line-height:1.6">열화상·레이저레벨·공기질 측정 장면을 4구역으로 기록합니다.</p></div>
      <div id="equipWrap"></div>
      <button class="btn g" onclick="addEquip()">＋ 측정 항목 추가</button>
    </section>

    <!-- AIR -->
    <section id="air">
      <div class="card">
        <div class="h"><span class="e">🌬️</span>실내 공기질 측정</div>
        <div id="aqWrap"></div>
      </div>
    </section>

    <!-- REPORT -->
    <section id="report">
      <div class="card">
        <div class="h"><span class="e">📄</span>보고서 / 데이터</div>
        <div id="reportSummary" style="margin-bottom:16px"></div>
        <button class="btn p" onclick="openReport()">📄 보고서 미리보기 / 인쇄(PDF)</button>
        <div class="row2" style="margin-top:10px">
          <button class="btn g sm" onclick="exportJSON()">⬇ 백업 내보내기</button>
          <button class="btn g sm" onclick="document.getElementById('importFile').click()">⬆ 백업 복원</button>
        </div>
        <input type="file" id="importFile" accept="application/json" class="hidden" onchange="importJSON(this)">
      </div>
    </section>
  </main>
</div>

<button class="fab" id="fab" onclick="fabAction()" style="display:none">＋</button>

<!-- camera -->
<div class="cam" id="cam">
  <div class="stage">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div class="tag" id="camTag">원경</div>
    <div class="hint">화면을 탭해 하자 위치 표시 · 다시 탭하면 취소</div>
  </div>
  <div class="bar">
    <button class="cbtn txt" onclick="clearMarks()">표시 지우기</button>
    <button class="shutter" onclick="capture()"></button>
    <button class="cbtn" onclick="closeCam()">✕</button>
  </div>
</div>

<!-- generic sheet -->
<div class="sheet" id="sheet" onclick="if(event.target===this)closeSheet()">
  <div class="panel" id="sheetPanel"></div>
</div>

<div class="load" id="load"><div class="spin"></div></div>
<div class="toast" id="toast"></div>
<div id="reportDoc"></div>
<input type="file" id="galleryInput" accept="image/*" class="hidden">

<script>
/* ============================================================
   더홈점검 v2 — 로직 (바닐라 · IndexedDB · 오프라인)
   ============================================================ */

/* ---------- 분류 체계 (기존 앱 계승) ---------- */
const SPACES=['거실','주방','안방','침실1','침실2','침실3','드레스룸','욕실','공용욕실','현관','발코니','다용도실','복도','팬트리'];
const LOCS=['벽','바닥','천장','도배','가구','창','문','짝','틀','마감판','수전','타일','도장','줄눈','코킹'];
const TYPES=['유격','틈새','단차','파손','긁힘','찍힘','들뜸','오염','마감','고정','수평/수직'];
const STATES=['전체','다수','작동','돌출','불량','누락'];
const ZONES=['좌측상단','우측상단','좌측하단','우측하단'];
const AQ_ITEMS=[['폼알데하이드','HCHO · µg/m³'],['총휘발성유기화합물','TVOC · µg/m³'],['라돈','Bq/m³'],['이산화탄소','CO₂ · ppm'],['미세먼지','PM10 · µg/m³']];
const MAX_SEL=4, MAX_PHOTO_PX=1280;

/* 공종 색상 (요약 칩) */
const GONG=[
  [['도배','벽지'],'도배','#7c3aed'],[['도장','페인트','퍼티'],'도장','#2563eb'],
  [['타일','줄눈'],'타일','#0891b2'],[['바닥','마루','강마루','장판'],'바닥재','#b45309'],
  [['가구','싱크','수납','신발장'],'가구','#9333ea'],[['창','문','틀','짝'],'창호','#0d9488'],
  [['수전','배수','누수','설비'],'설비','#475569'],[['실리콘','코킹'],'실리콘','#db2777'],
  [['콘센트','전기','조명','스위치'],'전기','#ea580c'],[['유리'],'유리','#0284c7']
];
function gong(d){
  const s=((d.locations||[]).join(' ')+' '+(d.types||[]).join(' ')+' '+(d.detail||'')).toLowerCase();
  for(const[keys,name,c]of GONG){if(keys.some(k=>s.includes(k.toLowerCase())))return{name,c};}
  if((d.locations||[]).length||(d.types||[]).length)return{name:'기타',c:'#94a3b8'};
  return null;
}

/* ---------- IndexedDB ---------- */
let db=null;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open('thehome_v2',1);
  r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('projects'))d.createObjectStore('projects',{keyPath:'id'});};
  r.onsuccess=e=>{db=e.target.result;res();};
  r.onerror=()=>rej(r.error);
});}
function tx(mode){return db.transaction('projects',mode).objectStore('projects');}
function dbAll(){return new Promise(res=>{const out=[];const c=tx('readonly').openCursor();
  c.onsuccess=e=>{const cur=e.target.result;if(cur){out.push(cur.value);cur.continue();}else res(out);};});}
function dbPut(p){return new Promise(res=>{tx('readwrite').put(p).onsuccess=res;});}
function dbDel(id){return new Promise(res=>{tx('readwrite').delete(id).onsuccess=res;});}

/* ---------- 상태 ---------- */
let projects=[], curId=null, saveTimer=null;
function cur(){return projects.find(p=>p.id===curId)||null;}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

function blankProject(){return{id:uid(),apt:'',dong:'',ho:'',date:new Date().toISOString().slice(0,10),
  author:'',cust:'',phone:'',defects:[],equip:[],aq:{},updated:Date.now()};}

async function init(){
  try{await openDB();projects=await dbAll();}catch(e){toast('저장소 초기화 실패');}
  projects.sort((a,b)=>b.updated-a.updated);
  if(projects.length)curId=projects[0].id;
  renderAll();
}
function save(){const p=cur();if(!p)return;p.updated=Date.now();clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>dbPut(p),350);}
function saveNow(){const p=cur();if(p){p.updated=Date.now();dbPut(p);}}

/* ---------- 네비게이션 ---------- */
function go(t,el){
  document.querySelectorAll('section').forEach(s=>s.classList.toggle('on',s.id===t));
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  if(el){try{el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}catch(e){}}
  else{const b=document.querySelector('.tab[data-t="'+t+'"]');if(b)b.classList.add('on');
       document.querySelectorAll('.tab').forEach(x=>{if(x.dataset.t!==t)x.classList.remove('on')});}
  const fab=document.getElementById('fab');
  fab.style.display=(t==='defects'||t==='equip')&&cur()?'grid':'none';
  if(t==='report')renderReportSummary();
  window.scrollTo({top:0,behavior:'smooth'});
}
function fabAction(){const on=document.querySelector('section.on').id;
  if(on==='defects')addDefect();else if(on==='equip')addEquip();}

/* ---------- 렌더: 전체 ---------- */
function renderAll(){renderProjects();renderDefects();renderEquip();renderAQ();renderCtx();renderProgress();}

function renderCtx(){const p=cur();const c=document.getElementById('ctx');
  if(!p||!(p.apt||p.dong)){c.className='ctx empty';c.innerHTML='프로젝트를 선택하세요';return;}
  c.className='ctx';c.innerHTML='<span class="name">'+esc(p.apt||'(단지 미입력)')+'</span>'+
    '<span class="unit">'+esc(p.dong||'-')+'동 '+esc(p.ho||'-')+'호</span>';
}
function renderProgress(){const p=cur();let v=0;
  if(p){if(p.apt&&p.dong&&p.ho)v+=25;if(p.defects.length)v+=30;if(p.defects.some(d=>d.photos&&d.photos[0]&&d.photos[1]))v+=15;
    if(p.equip&&p.equip.length)v+=15;if(Object.keys(p.aq||{}).length)v+=15;}
  document.getElementById('prog').style.width=v+'%';}

/* ---------- 프로젝트 ---------- */
function renderProjects(){
  const el=document.getElementById('plist');
  if(!projects.length){el.innerHTML='<div class="empty"><span class="e">📭</span>등록된 프로젝트가 없습니다<br>아래 버튼으로 시작하세요</div>';
    document.getElementById('pinfoCard').style.display='none';return;}
  el.innerHTML=projects.map(p=>{
    const ph=p.defects.filter(d=>d.photos&&d.photos[0]&&d.photos[1]).length;
    return '<div class="pitem '+(p.id===curId?'on':'')+'" onclick="selectProject(\''+p.id+'\')">'+
      '<div class="pi-main"><b>'+esc(p.apt||'(단지 미입력)')+'</b>'+
      '<span>'+esc(p.dong||'-')+'동 '+esc(p.ho||'-')+'호 · '+esc(p.date||'')+'</span></div>'+
      '<div class="pi-cnt"><b>'+p.defects.length+'</b>하자 · 📷'+ph+'</div></div>';
  }).join('');
  const p=cur();document.getElementById('pinfoCard').style.display=p?'block':'none';
  if(p)fillForm(p);
}
function fillForm(p){const m={f_apt:'apt',f_dong:'dong',f_ho:'ho',f_date:'date',f_author:'author',f_cust:'cust',f_phone:'phone'};
  for(const id in m){const e=document.getElementById(id);if(e)e.value=p[m[id]]||'';}}
async function newProject(){const p=blankProject();projects.unshift(p);curId=p.id;await dbPut(p);renderAll();
  document.getElementById('pinfoCard').style.display='block';toast('새 프로젝트 생성');document.getElementById('f_apt').focus();}
function selectProject(id){curId=id;renderAll();toast('프로젝트 전환');}
function upd(k,v){const p=cur();if(!p)return;p[k]=v;save();
  if(k==='apt'||k==='dong'||k==='ho'){renderCtx();renderProgress();
    const it=document.querySelector('.pitem.on .pi-main');}}
async function delProject(){const p=cur();if(!p)return;
  if(!confirm('이 프로젝트를 삭제할까요? 되돌릴 수 없습니다.\n\n'+(p.apt||'(단지 미입력)')+' '+p.dong+'동 '+p.ho+'호'))return;
  await dbDel(p.id);projects=projects.filter(x=>x.id!==p.id);curId=projects[0]?projects[0].id:null;renderAll();toast('삭제됨');}

/* ---------- 하자 ---------- */
function addDefect(){const p=cur();if(!p){toast('먼저 프로젝트를 선택하세요');go('projects');return;}
  const last=p.defects[p.defects.length-1];
  if(last&&!(last.photos&&last.photos[0]&&last.photos[1])){toast('이전 하자 사진 2장(원경·근경)을 먼저 채워주세요');
    setTimeout(()=>{const w=document.getElementById('defectWrap');if(w.lastElementChild)w.lastElementChild.scrollIntoView({behavior:'smooth',block:'center'});},80);return;}
  p.defects.push({id:uid(),spaces:[],locations:[],types:[],detail:'',desc:'',photos:[null,null]});
  saveNow();renderDefects();renderProgress();go('defects');
  setTimeout(()=>{const w=document.getElementById('defectWrap');if(w.lastElementChild)w.lastElementChild.scrollIntoView({behavior:'smooth',block:'start'});},80);
  toast('하자 추가됨');}

function renderDefects(){const p=cur();const w=document.getElementById('defectWrap');
  if(!p){w.innerHTML='<div class="card"><div class="empty"><span class="e">🔍</span>프로젝트를 선택하면<br>하자점검을 시작합니다</div></div>';return;}
  if(!p.defects.length){w.innerHTML='<div class="card"><div class="empty"><span class="e">✅</span>아직 등록된 하자가 없습니다<br>우측 하단 ＋ 버튼으로 추가</div></div>';return;}
  w.innerHTML=p.defects.map((d,i)=>defectCard(d,i)).join('');}

function defectCard(d,i){
  const g=gong(d);
  const tag=g?'<span class="tagchip" style="background:'+g.c+'">'+g.name+'</span>':'';
  const summary=d.desc?'<span class="dsummary">'+esc(d.desc)+'</span>':'<span class="dsummary" style="color:var(--ink-3)">내용 미입력</span>';
  return '<div class="dcard" id="d_'+d.id+'">'+
    '<div class="dhead"><span class="dno">No.'+String(i+1).padStart(2,'0')+'</span>'+tag+summary+'</div>'+
    photoSlots(d)+
    selectBlock(d,'공간','spaces',SPACES)+
    selectBlock(d,'위치','locations',LOCS)+
    '<div class="field"><label class="f">📝 상세위치 (선택)</label>'+
      '<input class="in" value="'+esc(d.detail||'')+'" placeholder="예: 좌측 상부 신발장" oninput="updDefect(\''+d.id+'\',\'detail\',this.value)"></div>'+
    '<div class="field"><label class="f">하자 유형 · 상태 (최대 '+MAX_SEL+'개)</label>'+
      '<div class="count">'+(d.types||[]).length+'/'+MAX_SEL+' 선택됨</div>'+
      '<div class="sub-h">유형</div><div class="chips">'+chipsHTML(d,'types',TYPES)+'</div>'+
      '<div class="sub-h">상태 / 정도</div><div class="chips">'+chipsHTML(d,'types',STATES)+'</div></div>'+
    '<div class="field"><label class="f">자동 생성 내용</label>'+
      '<textarea class="in" readonly style="background:rgba(13,148,102,.06)">'+esc(d.desc||'')+'</textarea></div>'+
    '<button class="btn bad sm" onclick="delDefect(\''+d.id+'\')">🗑 하자 삭제</button></div>';
}
function selectBlock(d,label,field,arr){
  return '<div class="field"><label class="f">'+label+' 선택 (최대 '+MAX_SEL+'개)</label>'+
    '<div class="count">'+(d[field]||[]).length+'/'+MAX_SEL+' 선택됨</div>'+
    '<div class="chips">'+chipsHTML(d,field,arr)+'</div></div>';
}
function chipsHTML(d,field,arr){const sel=d[field]||[];
  return arr.map(v=>{const on=sel.includes(v);const dis=!on&&sel.length>=MAX_SEL?'disabled':'';
    return '<button class="chip '+(on?'on':'')+'" '+dis+' onclick="toggleSel(\''+d.id+'\',\''+field+'\',\''+v+'\')">'+v+'</button>';}).join('');}

function toggleSel(id,field,v){const p=cur();const d=p.defects.find(x=>x.id===id);if(!d)return;
  if(!d[field])d[field]=[];const i=d[field].indexOf(v);
  if(i>-1)d[field].splice(i,1);else{if(d[field].length>=MAX_SEL){toast('최대 '+MAX_SEL+'개까지');return;}d[field].push(v);}
  autoDesc(d);save();patchDefect(d);}
function updDefect(id,k,v){const p=cur();const d=p.defects.find(x=>x.id===id);if(!d)return;d[k]=v;autoDesc(d);save();
  // 상세위치는 리렌더 없이 요약/내용만 갱신
  const card=document.getElementById('d_'+id);if(card){const ta=card.querySelector('textarea');if(ta)ta.value=d.desc;
    const g=gong(d),head=card.querySelector('.dhead');}}
function autoDesc(d){const parts=[];
  if(d.spaces&&d.spaces.length)parts.push(d.spaces.join('·'));
  if(d.detail)parts.push(d.detail);
  if(d.locations&&d.locations.length)parts.push(d.locations.join('·'));
  if(d.types&&d.types.length)parts.push(d.types.join(' '));
  d.desc=parts.join(' ')+(parts.length?' 하자':'');}
function patchDefect(d){const card=document.getElementById('d_'+d.id);if(!card)return;
  const idx=cur().defects.indexOf(d);
  card.outerHTML=defectCard(d,idx);renderProgress();}
function delDefect(id){const p=cur();if(!confirm('이 하자를 삭제할까요?'))return;
  p.defects=p.defects.filter(x=>x.id!==id);saveNow();renderDefects();renderProgress();toast('삭제됨');}

function photoSlots(d){
  const slot=(idx,tag,label)=>{const src=d.photos&&d.photos[idx];
    if(src)return '<div class="slot filled"><span class="badge">'+tag+'</span><img src="'+src+'">'+
      '<div class="acts"><button onclick="shoot(\''+d.id+'\','+idx+')">🔄 재촬영</button>'+
      '<button onclick="pick(\''+d.id+'\','+idx+')">🖼 갤러리</button>'+
      '<button class="del" onclick="rmPhoto(\''+d.id+'\','+idx+')">🗑</button></div></div>';
    return '<div class="slot"><div class="ph" onclick="shoot(\''+d.id+'\','+idx+')">'+
      '<span class="ic">📷</span><span class="lb">'+label+'</span><span class="tag">'+tag+' · 탭하여 촬영</span></div>'+
      '<div class="acts"><button onclick="pick(\''+d.id+'\','+idx+')">🖼 갤러리에서 선택</button></div></div>';};
  return '<label class="f">📷 사진 (필수 2장 · 멀리서 → 가까이서)</label><div class="shots">'+
    slot(0,'원경','원경 사진')+slot(1,'근경','근경 사진')+'</div>';
}
function rmPhoto(id,idx){const p=cur();const d=p.defects.find(x=>x.id===id);if(!d)return;
  d.photos[idx]=null;saveNow();patchDefect(d);}

/* ---------- 카메라 ---------- */
let camStream=null,camTarget=null,marks=[];
async function shoot(id,idx){camTarget={kind:'defect',id,idx};openCam(idx===0?'원경':'근경');}
async function openCam(tagText){
  marks=[];document.getElementById('camTag').textContent=tagText||'';
  const cam=document.getElementById('cam');cam.classList.add('on');
  try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});
    const v=document.getElementById('vid');v.srcObject=camStream;await v.play();sizeOverlay();}
  catch(e){toast('카메라를 열 수 없어 갤러리로 전환합니다');closeCam();if(camTarget)pick(camTarget.id,camTarget.idx);}
}
function sizeOverlay(){const v=document.getElementById('vid'),c=document.getElementById('overlay');
  c.width=v.clientWidth;c.height=v.clientHeight;drawMarks();
  c.onpointerdown=ev=>{const r=c.getBoundingClientRect();const x=ev.clientX-r.left,y=ev.clientY-r.top;
    const hit=marks.findIndex(m=>Math.hypot(m.x-x,m.y-y)<34);
    if(hit>-1)marks.splice(hit,1);else if(marks.length<10)marks.push({x,y});drawMarks();};}
function drawMarks(){const c=document.getElementById('overlay'),g=c.getContext('2d');g.clearRect(0,0,c.width,c.height);
  marks.forEach((m,i)=>{g.beginPath();g.arc(m.x,m.y,26,0,7);g.lineWidth=4;g.strokeStyle='#1ec88f';g.stroke();
    g.fillStyle='rgba(30,200,143,.25)';g.fill();
    g.fillStyle='#1ec88f';g.font='bold 15px monospace';g.textAlign='center';g.textBaseline='middle';g.fillText(i+1,m.x,m.y);});}
function clearMarks(){marks=[];drawMarks();}
function capture(){
  const v=document.getElementById('vid');if(!v.videoWidth){toast('잠시 후 다시 시도');return;}
  const cw=v.clientWidth,ch=v.clientHeight;
  // 표시 영역(cover) → 원본 좌표 매핑
  const scale=Math.max(v.videoWidth/cw,v.videoHeight/ch);
  const ow=v.videoWidth,oh=v.videoHeight;
  const cnv=document.createElement('canvas');
  let tw=ow,th=oh;if(Math.max(tw,th)>MAX_PHOTO_PX){const k=MAX_PHOTO_PX/Math.max(tw,th);tw=Math.round(tw*k);th=Math.round(th*k);}
  cnv.width=tw;cnv.height=th;const g=cnv.getContext('2d');
  g.drawImage(v,0,0,tw,th);
  // 마커 합성
  const offX=(ow-cw*scale)/2,offY=(oh-ch*scale)/2,k=tw/ow;
  marks.forEach((m,i)=>{const X=(m.x*scale+offX)*k,Y=(m.y*scale+offY)*k,R=26*scale*k;
    g.beginPath();g.arc(X,Y,R,0,7);g.lineWidth=Math.max(3,4*scale*k);g.strokeStyle='#1ec88f';g.stroke();
    g.fillStyle='rgba(30,200,143,.25)';g.fill();
    g.fillStyle='#1ec88f';g.font='bold '+Math.round(15*scale*k)+'px monospace';g.textAlign='center';g.textBaseline='middle';g.fillText(i+1,X,Y);});
  const data=cnv.toDataURL('image/jpeg',.82);
  applyPhoto(data);closeCam();
}
function applyPhoto(data){if(!camTarget)return;const p=cur();const d=p.defects.find(x=>x.id===camTarget.id);
  if(d){if(!d.photos)d.photos=[null,null];d.photos[camTarget.idx]=data;saveNow();patchDefect(d);renderProgress();
    setTimeout(()=>{const c=document.getElementById('d_'+d.id);if(c)c.scrollIntoView({behavior:'smooth',block:'nearest'});},60);}
  toast('사진 저장됨');}
function closeCam(){const cam=document.getElementById('cam');cam.classList.remove('on');
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  const c=document.getElementById('overlay');c.onpointerdown=null;}

/* ---------- 갤러리 ---------- */
function pick(id,idx){camTarget={kind:'defect',id,idx};const inp=document.getElementById('galleryInput');
  inp.onchange=()=>{const f=inp.files[0];if(f)resizeFile(f,applyPhoto);inp.value='';};inp.click();}
function resizeFile(file,cb){const r=new FileReader();r.onload=()=>{const img=new Image();
  img.onload=()=>{let w=img.width,h=img.height;if(Math.max(w,h)>MAX_PHOTO_PX){const k=MAX_PHOTO_PX/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k);}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',.82));};img.src=r.result;};r.readAsDataURL(file);}

/* ---------- 장비 ---------- */
function addEquip(){const p=cur();if(!p){toast('먼저 프로젝트를 선택하세요');go('projects');return;}
  p.equip.push({id:uid(),name:'',photos:{}});saveNow();renderEquip();renderProgress();go('equip');toast('측정 항목 추가');}
function renderEquip(){const p=cur();const w=document.getElementById('equipWrap');if(!w)return;
  if(!p){w.innerHTML='';return;}
  if(!p.equip.length){w.innerHTML='<div class="card"><div class="empty"><span class="e">📸</span>측정 항목을 추가하세요</div></div>';return;}
  w.innerHTML=p.equip.map(eq=>'<div class="card tight" id="eq_'+eq.id+'">'+
    '<div class="field"><input class="in" value="'+esc(eq.name||'')+'" placeholder="측정 항목명 (예: 거실 열화상)" oninput="updEquip(\''+eq.id+'\',this.value)"></div>'+
    '<div class="eqgrid">'+ZONES.map((z,zi)=>{const src=eq.photos[z];
      return '<div class="eqslot '+(src?'filled':'')+'" onclick="shootEq(\''+eq.id+'\',\''+z+'\')">'+
        (src?'<img src="'+src+'">':'<span class="ic">📷</span>')+'<span class="zl">'+z+'</span></div>';}).join('')+'</div>'+
    '<button class="btn bad sm" style="margin-top:10px" onclick="delEquip(\''+eq.id+'\')">🗑 항목 삭제</button></div>').join('');}
function updEquip(id,v){const p=cur();const eq=p.equip.find(x=>x.id===id);if(eq){eq.name=v;save();}}
function delEquip(id){const p=cur();if(!confirm('이 측정 항목을 삭제할까요?'))return;p.equip=p.equip.filter(x=>x.id!==id);saveNow();renderEquip();renderProgress();}
function shootEq(id,zone){camTarget={kind:'equip',id,zone};
  // 장비는 갤러리/카메라 선택지를 간단히: 카메라 우선
  camTargetApply=(data)=>{const p=cur();const eq=p.equip.find(x=>x.id===id);if(eq){eq.photos[zone]=data;saveNow();renderEquip();renderProgress();}};
  openCamGeneric(zone);}
let camTargetApply=null;
function openCamGeneric(tag){marks=[];document.getElementById('camTag').textContent=tag;
  const cam=document.getElementById('cam');cam.classList.add('on');
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false})
    .then(s=>{camStream=s;const v=document.getElementById('vid');v.srcObject=s;v.play();sizeOverlay();})
    .catch(()=>{toast('카메라 불가 · 갤러리로');closeCam();const inp=document.getElementById('galleryInput');
      inp.onchange=()=>{const f=inp.files[0];if(f)resizeFile(f,d=>{if(camTargetApply)camTargetApply(d);});inp.value='';};inp.click();});}
// capture() 가 defect/equip 모두 처리하도록 보강
const _applyPhoto=applyPhoto;
applyPhoto=function(data){if(camTarget&&camTarget.kind==='equip'){if(camTargetApply)camTargetApply(data);toast('사진 저장됨');camTargetApply=null;return;}_applyPhoto(data);};

/* ---------- 공기질 ---------- */
function renderAQ(){const p=cur();const w=document.getElementById('aqWrap');if(!w)return;
  if(!p){w.innerHTML='<div class="empty">프로젝트를 선택하세요</div>';return;}
  w.innerHTML=AQ_ITEMS.map(([nm,unit])=>{const v=(p.aq&&p.aq[nm])||'';
    return '<div class="aq"><div class="nm">'+nm+'<small>'+unit+'</small></div>'+
      '<input class="in" inputmode="decimal" value="'+esc(v)+'" placeholder="측정값" oninput="updAQ(\''+esc(nm)+'\',this.value)"></div>';}).join('');}
function updAQ(nm,v){const p=cur();if(!p)return;if(!p.aq)p.aq={};if(v==='')delete p.aq[nm];else p.aq[nm]=v;save();renderProgress();}

/* ---------- 보고서 ---------- */
function renderReportSummary(){const p=cur();const el=document.getElementById('reportSummary');
  if(!p){el.innerHTML='<div class="empty">프로젝트를 선택하세요</div>';return;}
  const full=p.defects.filter(d=>d.photos&&d.photos[0]&&d.photos[1]).length;
  const byGong={};p.defects.forEach(d=>{const g=gong(d);if(g){byGong[g.name]=(byGong[g.name]||0)+1;}});
  const rows=Object.entries(byGong).map(([k,v])=>'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line)"><span>'+k+'</span><b style="font-family:var(--mono)">'+v+'</b></div>').join('')||'<div style="color:var(--ink-2)">분류된 하자 없음</div>';
  el.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'+
    statBox('하자',p.defects.length)+statBox('사진완료',full+'/'+p.defects.length)+
    statBox('장비항목',p.equip.length)+statBox('공기질',Object.keys(p.aq||{}).length)+'</div>'+
    '<div class="sub-h">공종별 분포</div>'+rows;}
function statBox(l,v){return '<div style="background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px">'+
  '<div style="font-size:11px;color:var(--ink-2);font-family:var(--mono);letter-spacing:.5px">'+l+'</div>'+
  '<div style="font-size:24px;font-weight:800;color:var(--brand-bright);margin-top:2px">'+v+'</div></div>';}

function openReport(){const p=cur();if(!p){toast('프로젝트를 선택하세요');return;}
  const doc=document.getElementById('reportDoc');
  const today=new Date().toLocaleDateString('ko-KR');
  let html='<div style="font-family:sans-serif;color:#111;padding:24px;max-width:760px;margin:0 auto">';
  html+='<div style="border-bottom:3px solid #0d9466;padding-bottom:14px;margin-bottom:20px">'+
    '<div style="font-size:13px;letter-spacing:3px;color:#0d9466;font-weight:700">THE HOME INSPECTION</div>'+
    '<div style="font-size:26px;font-weight:800;margin-top:4px">입주 전 사전점검 보고서</div></div>';
  html+='<table style="width:100%;font-size:14px;border-collapse:collapse;margin-bottom:22px">'+
    rowT('단지',p.apt)+rowT('동/호',p.dong+'동 '+p.ho+'호')+rowT('점검일',p.date)+
    rowT('점검자',p.author)+rowT('고객',p.cust)+rowT('발행일',today)+'</table>';
  html+='<div style="font-size:18px;font-weight:800;border-left:4px solid #0d9466;padding-left:10px;margin:16px 0">하자 내역 ('+p.defects.length+'건)</div>';
  p.defects.forEach((d,i)=>{const g=gong(d);
    html+='<div style="border:1px solid #ddd;border-radius:10px;padding:14px;margin-bottom:14px;page-break-inside:avoid">'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
      '<span style="background:#0d9466;color:#fff;font-weight:800;padding:3px 10px;border-radius:6px;font-size:13px">No.'+String(i+1).padStart(2,'0')+'</span>'+
      (g?'<span style="background:'+g.c+';color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px">'+g.name+'</span>':'')+
      '<span style="font-weight:700;font-size:14px">'+esc(d.desc||'(내용 미입력)')+'</span></div>'+
      '<div style="display:flex;gap:10px">'+
      (d.photos&&d.photos[0]?'<img src="'+d.photos[0]+'" style="width:50%;border-radius:8px">':'')+
      (d.photos&&d.photos[1]?'<img src="'+d.photos[1]+'" style="width:50%;border-radius:8px">':'')+
      '</div></div>';});
  if(Object.keys(p.aq||{}).length){html+='<div style="font-size:18px;font-weight:800;border-left:4px solid #0d9466;padding-left:10px;margin:16px 0">실내 공기질</div><table style="width:100%;font-size:14px;border-collapse:collapse">';
    AQ_ITEMS.forEach(([nm,unit])=>{if(p.aq[nm])html+=rowT(nm,p.aq[nm]+'  ('+unit+')');});html+='</table>';}
  html+='<div style="margin-top:30px;padding-top:14px;border-top:1px solid #ccc;font-size:12px;color:#666">더홈점검 · 본 보고서는 현장 점검 결과를 기록한 문서입니다.</div></div>';
  doc.innerHTML=html;setTimeout(()=>window.print(),200);}
function rowT(k,v){return '<tr><td style="padding:7px 10px;background:#f3f4f6;font-weight:700;width:110px;border:1px solid #e5e7eb">'+k+'</td><td style="padding:7px 10px;border:1px solid #e5e7eb">'+esc(v||'-')+'</td></tr>';}

/* ---------- 백업 ---------- */
function exportJSON(){const p=cur();if(!p){toast('프로젝트를 선택하세요');return;}
  const blob=new Blob([JSON.stringify(p,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(p.apt||'project')+'_'+p.dong+'동'+p.ho+'호.json';a.click();URL.revokeObjectURL(a.href);toast('백업 저장됨');}
function importJSON(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=async()=>{try{const o=JSON.parse(r.result);o.id=uid();o.updated=Date.now();
    o.defects=o.defects||[];o.equip=o.equip||[];o.aq=o.aq||{};
    projects.unshift(o);curId=o.id;await dbPut(o);renderAll();go('projects');toast('복원 완료');}
    catch(e){toast('파일을 읽을 수 없습니다');}inp.value='';};r.readAsText(f);}

/* ---------- 테마 / 유틸 ---------- */
function toggleTheme(){const dark=!document.body.classList.contains('light');
  document.body.classList.toggle('light',dark);
  document.getElementById('themeBtn').textContent=dark?'☀️':'🌙';
  try{localStorage.setItem('thehome_v2_theme',dark?'light':'dark');}catch(e){}}
function loadTheme(){try{if(localStorage.getItem('thehome_v2_theme')==='light'){document.body.classList.add('light');document.getElementById('themeBtn').textContent='☀️';}}catch(e){}}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let toastTimer=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('on'),2200);}
function closeSheet(){document.getElementById('sheet').classList.remove('on');}

/* ---------- 부팅 ---------- */
loadTheme();
window.addEventListener('orientationchange',()=>{if(camStream)setTimeout(sizeOverlay,300);});
window.addEventListener('resize',()=>{if(camStream)sizeOverlay();});
init();
</script>
</body>
